<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>06.20 — 김혜원</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&family=DM+Mono:ital@0;1&display=swap" rel="stylesheet">
  <script>
    if (location.protocol === 'file:') {
      location.replace('https://mheechan.github.io/birthday/');
    }
  </script>
  <script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=43cf34s2e6"></script>
  <script>
    window.navermap_authFailure = function () {
      document.getElementById('map').innerHTML =
        '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#8a8780;font-family:sans-serif;font-size:14px;text-align:center;padding:20px;">' +
        '지도 인증 실패<br><span style="font-size:12px;">file:// 말고 로컬 서버 주소로 열어야 합니다</span></div>';
    };
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f4;
      --surface: #ffffff;
      --border: #e2e0db;
      --text: #1a1916;
      --muted: #8a8780;
      --accent: #1a1916;
      --tag-bg: #edece9;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    body.splash-open {
      overflow: hidden;
    }

    .splash {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      padding: 28px;
      background:
        linear-gradient(rgba(247, 246, 244, 0.78), rgba(247, 246, 244, 0.92)),
        url('./cafe/아스티에드빌라트카페.jpg') center / cover no-repeat;
    }

    .splash[hidden] {
      display: none;
    }

    .splash-inner {
      width: min(520px, 100%);
      color: var(--text);
    }

    .splash-date {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.16em;
      margin-bottom: 18px;
    }

    .splash-title {
      font-size: clamp(2.35rem, 8vw, 5.3rem);
      font-weight: 500;
      line-height: 0.98;
      margin-bottom: 18px;
    }

    .splash-subtitle {
      font-size: clamp(1.05rem, 3.4vw, 1.45rem);
      font-weight: 400;
      line-height: 1.45;
      margin-bottom: 30px;
    }

    .splash-enter {
      border: 1px solid var(--text);
      border-radius: 6px;
      background: var(--text);
      color: #fff;
      min-height: 44px;
      padding: 0 18px;
      font-size: 0.92rem;
      font-weight: 500;
      cursor: pointer;
    }

    .splash-enter:hover {
      background: #000;
    }

    /* 레이아웃 */
    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      min-height: 100vh;
    }

    /* 사이드바 */
    .sidebar {
      border-right: 1px solid var(--border);
      padding: 48px 32px;
      display: flex;
      flex-direction: column;
      gap: 48px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-header {}

    .date-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .name {
      font-size: 2rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    .name-sub {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 6px;
    }

    /* 타임라인 */
    .timeline {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .stop {
      display: grid;
      grid-template-columns: 48px 1fr;
      gap: 0 12px;
      cursor: pointer;
    }

    .stop-line {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .stop-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      border: 2px solid var(--border);
      flex-shrink: 0;
      margin-top: 18px;
      transition: background 0.2s, border-color 0.2s;
    }

    .stop.active .stop-dot,
    .stop:hover .stop-dot {
      background: var(--accent);
      border-color: var(--accent);
    }

    .stop-connector {
      width: 1px;
      flex: 1;
      background: var(--border);
      margin: 4px 0;
    }

    .stop:last-child .stop-connector {
      display: none;
    }

    .stop-body {
      padding: 12px 0 20px;
    }

    .stop-time {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      margin-bottom: 3px;
    }

    .stop-name {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.3;
    }

    .stop-desc {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2px;
      line-height: 1.5;
    }

    .stop.active .stop-name {
      color: var(--accent);
    }

    .route-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 7px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .route-btn:hover {
      color: var(--text);
      border-color: var(--text);
    }

    /* 메인 — 지도 */
    .main {
      display: flex;
      flex-direction: column;
      position: relative;
      min-width: 0;
    }

    .map-header {
      padding: 20px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .map-title {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .stop-count {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    #map {
      flex: 1;
      width: 100%;
      min-height: calc(100vh - 60px);
    }

    [hidden] {
      display: none !important;
    }

    .bottom-panel {
      position: absolute;
      left: 28px;
      right: 28px;
      bottom: 24px;
      max-height: min(430px, calc(100vh - 120px));
      overflow: auto;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.14);
      padding: 18px;
      z-index: 20;
    }

    .panel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }

    .panel-kicker {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .panel-title {
      font-size: 0.95rem;
      font-weight: 500;
      line-height: 1.35;
    }

    .panel-close {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      flex: 0 0 auto;
    }

    .route-options {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
    }

    .route-option {
      display: block;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      background: var(--surface);
      text-align: left;
      cursor: pointer;
      color: var(--text);
      text-decoration: none;
    }

    .route-option.active,
    .route-option:hover {
      border-color: var(--text);
    }

    .route-option strong {
      display: block;
      font-size: 0.86rem;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .route-option span {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.45;
    }

    .route-option em {
      display: block;
      margin-top: 8px;
      color: var(--text);
      font-size: 0.75rem;
      font-style: normal;
      font-weight: 500;
    }

    .route-detail {
      margin-top: 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      padding: 14px;
    }

    .route-detail-title {
      font-size: 0.95rem;
      font-weight: 500;
      line-height: 1.35;
      margin-bottom: 8px;
    }

    .route-detail-list {
      display: grid;
      gap: 7px;
      list-style: none;
    }

    .route-detail-list li {
      font-size: 0.86rem;
      color: var(--text);
      line-height: 1.55;
      padding-left: 13px;
      position: relative;
    }

    .route-detail-list li::before {
      content: "";
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--text);
      position: absolute;
      left: 0;
      top: 0.78em;
    }

    .route-note {
      margin-top: 10px;
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.55;
    }

    .cafe-detail {
      display: grid;
      grid-template-columns: 112px 1fr;
      gap: 14px;
      align-items: stretch;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      overflow: hidden;
      margin-bottom: 14px;
    }

    .cafe-detail img {
      width: 100%;
      height: 100%;
      min-height: 160px;
      object-fit: contain;
      background: #f1f0ed;
      display: block;
    }

    .cafe-detail-body {
      padding: 14px 14px 14px 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .cafe-detail-title {
      font-size: 0.95rem;
      font-weight: 500;
      line-height: 1.35;
    }

    .cafe-reason {
      font-size: 0.96rem;
      color: var(--text);
      line-height: 1.7;
      font-weight: 400;
    }

    .cafe-address {
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.45;
    }

    .review-link {
      width: fit-content;
      margin-top: auto;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 5px 9px;
      color: var(--text);
      font-size: 0.75rem;
      text-decoration: none;
    }

    .review-link:hover {
      border-color: var(--text);
    }

    .cafe-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(138px, 1fr));
      gap: 12px;
    }

    .cafe-card {
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      background: var(--surface);
      cursor: pointer;
    }

    .cafe-card.active,
    .cafe-card:hover {
      border-color: var(--text);
    }

    .cafe-card img {
      width: 100%;
      height: 210px;
      object-fit: contain;
      background: #f1f0ed;
      display: block;
    }

    .cafe-card p {
      padding: 9px 10px 10px;
      font-size: 0.78rem;
      font-weight: 500;
      line-height: 1.35;
    }

    /* 모바일 */
    @media (max-width: 700px) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }

      .sidebar {
        position: static;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 32px 20px;
        gap: 32px;
      }

      #map {
        min-height: 60vh;
      }

      .bottom-panel {
        position: fixed;
        left: 12px;
        right: 12px;
        bottom: 12px;
        max-height: 58vh;
        padding: 14px;
      }

      .cafe-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .cafe-card img {
        height: 180px;
      }

      .cafe-detail {
        grid-template-columns: 96px 1fr;
      }

      .cafe-detail img {
        min-height: 150px;
      }

      .splash {
        align-items: end;
        justify-items: start;
        padding: 24px 20px 44px;
      }
    }
  </style>
</head>
<body class="splash-open">

    </div>
  </aside>

  <!-- 지도 -->
  <main class="main">
    <div class="map-header">
      <span class="map-title">Route Map</span>

      <div class="panel-head">

          <p class="panel-kicker" id="panel-kicker"></p>

<script>
  const stops = [
    { name: '풍덕천동 71-170', lat: 37.3219, lng: 127.1086, time: 'START', desc: '출발' },
    { name: '강별 성수',       lat: 37.5443, lng: 127.0557, time: '12:00', desc: '점심 코스', route: 1 },
    { name: '미닛뮤트 플래그십스토어', lat: 37.5356, lng: 126.9994, time: '이동', desc: '택시 이동', route: 2 },

    { name: '해방촌',          lat: 37.5422, lng: 126.9874, time: '저녁', desc: '간맥 후 귀가' },

  const cafes = [
    {
      name: '낫배드커피',

    {

    {

    {

  const routes = {
    1: {
      title: '풍덕천동 71-170 → 강별 성수',
      from: stops[0],
      to: stops[1],
      options: [

            '역에서 강별 성수까지 도보 이동',
          ],
          note: '신분당선 + 2호선 조합. 배차와 도보 위치에 따라 10분 정도 달라질 수 있음.',
        },
        {
          label: '택시',
          desc: '약 50~70분',
          detailTitle: '택시로 성수까지 · 약 50~70분',
          steps: [
            '풍덕천동에서 바로 강별 성수로 이동',
            '강남/한강 교량 진입 구간 정체가 있으면 시간이 크게 늘 수 있음',
            '도착지는 강별 성수로 찍고, 하차 후 주변 도보 이동',
          ],
          note: '점심 시간 맞추려면 출발 여유를 넉넉히 잡는 쪽.',
        },
      ],
    },
    2: {
      title: '강별 성수 → 미닛뮤트',
      from: stops[1],
      to: stops[2],
      options: [
        {
          label: '택시',
          desc: '약 20~35분',
          detailTitle: '택시로 한남까지 · 약 20~35분',
          steps: [
            '강별 성수에서 미닛뮤트 플래그십스토어로 바로 이동',
            '성수대교/한남대교 방면 차량 흐름에 따라 소요시간 변동',
            '미닛뮤트 도착 후 카페 후보들은 한남동 골목 도보권',
          ],
          note: '이 구간은 짐 있거나 더우면 택시가 제일 덜 피곤함.',
        },
        {
          label: '대중교통',
          desc: '약 35~45분',
          detailTitle: '대중교통으로 한남까지 · 약 35~45분',
          steps: [
            '성수역에서 2호선 탑승',
            '신당역에서 6호선으로 환승',
            '6호선 한강진역 하차',
            '한강진역에서 미닛뮤트까지 도보 이동',
          ],
          note: '2호선 + 6호선 조합. 성수역까지 걷는 시간 포함하면 택시보다 번거로운 선택지.',
        },
      ],
    },
  };

  const map = new naver.maps.Map('map', {
    center: new naver.maps.LatLng(37.48, 127.04),
    zoom: 11,
    mapTypeControl: false,
    scaleControl: false,
    logoControl: true,
    zoomControl: true,
    zoomControlOptions: { position: naver.maps.Position.TOP_RIGHT },
  });

  let activeSegmentLine = null;

  const panel = document.getElementById('detail-panel');
  const panelKicker = document.getElementById('panel-kicker');
  const panelTitle = document.getElementById('panel-title');
  const panelContent = document.getElementById('panel-content');
  const splash = document.getElementById('splash');
  const closeSplash = () => {
    splash.hidden = true;
    document.body.classList.remove('splash-open');
  };
  document.getElementById('splash-enter').addEventListener('click', closeSplash);
  document.addEventListener('keydown', (event) => {
    if (event.key === 'Escape' && !splash.hidden) closeSplash();
  });
  document.getElementById('panel-close').addEventListener('click', () => {
    panel.hidden = true;
  });

  const showPanel = (kicker, title, content) => {
    panelKicker.textContent = kicker;
    panelTitle.textContent = title;
    panelContent.innerHTML = content;
    panel.hidden = false;
  };

  const highlightSegment = (from, to) => {
    if (activeSegmentLine) activeSegmentLine.setMap(null);
    activeSegmentLine = new naver.maps.Polyline({
      map,
      path: [
        new naver.maps.LatLng(from.lat, from.lng),
        new naver.maps.LatLng(to.lat, to.lng),
      ],
      strokeColor: '#1a1916',
      strokeWeight: 5,
      strokeOpacity: 0.78,
    });
    const bounds = new naver.maps.LatLngBounds();
    bounds.extend(new naver.maps.LatLng(from.lat, from.lng));
    bounds.extend(new naver.maps.LatLng(to.lat, to.lng));
    map.fitBounds(bounds, { top: 90, right: 90, bottom: 180, left: 90 });
  };

  const showRoutePanel = (routeIndex) => {
    const route = routes[routeIndex];
    if (!route) return;
    highlightSegment(route.from, route.to);
    const routeDetail = (option) => `
      <div class="route-detail">
        <h3 class="route-detail-title">${option.detailTitle}</h3>
        <ul class="route-detail-list">
          ${option.steps.map(step => `<li>${step}</li>`).join('')}
        </ul>
        <p class="route-note">${option.note}</p>
      </div>
    `;
    showPanel(
      'Route',
      route.title,
      `<div class="route-options">
        ${route.options.map((option, index) => `
          <button class="route-option${index === 0 ? ' active' : ''}" type="button" data-route-option="${index}">
            <strong>${option.label}</strong>
            <span>${option.desc}</span>
          </button>
        `).join('')}
      </div>
      <div id="route-detail-slot">
        ${routeDetail(route.options[0])}
      </div>`
    );
    panelContent.querySelectorAll('.route-option').forEach((button) => {
      button.addEventListener('click', () => {
        const option = route.options[Number(button.dataset.routeOption)];
        panelContent.querySelectorAll('.route-option').forEach(el => el.classList.remove('active'));
        button.classList.add('active');
        document.getElementById('route-detail-slot').innerHTML = routeDetail(option);
        highlightSegment(route.from, route.to);
      });
    });
  };

  const showCafePanel = (selectedName = '') => {
    const selectedCafe = cafes.find(cafe => cafe.name === selectedName);
    const reviewUrl = (cafe) =>
      `https://search.naver.com/search.naver?query=${encodeURIComponent(`${cafe.name} 네이버 리뷰`)}`;
    showPanel(
      'Cafe',
      '한남동 카페 선택',
      `${selectedCafe ? `
        <article class="cafe-detail">
          <img src="${selectedCafe.img}" alt="${selectedCafe.name}">
          <div class="cafe-detail-body">
            <h3 class="cafe-detail-title">${selectedCafe.name}</h3>
            <p class="cafe-address">${selectedCafe.address}</p>
            ${selectedCafe.reason ? `<p class="cafe-reason">${selectedCafe.reason}</p>` : ''}
            <a class="review-link" href="${reviewUrl(selectedCafe)}" target="_blank" rel="noopener">더보기</a>
          </div>
        </article>
      ` : ''}
      <div class="cafe-grid">
        ${cafes.map(cafe => `
          <button class="cafe-card${cafe.name === selectedName ? ' active' : ''}" type="button" data-cafe="${cafe.name}">
            <img src="${cafe.img}" alt="${cafe.name}">
            <p>${cafe.name}</p>
          </button>
        `).join('')}
      </div>`
    );
    panelContent.querySelectorAll('.cafe-card').forEach((card) => {
      card.addEventListener('click', () => {
        const cafe = cafes.find(item => item.name === card.dataset.cafe);
        if (!cafe) return;
        showCafePanel(cafe.name);
        map.panTo(new naver.maps.LatLng(cafe.lat, cafe.lng));
        map.setZoom(17, true);
      });
    });
  };

  const renderTimeline = () => {
    const timeline = document.getElementById('timeline');
    timeline.innerHTML = stops.map((stop, index) => `
      <div class="stop" data-stop="${index}">
        <div class="stop-line">
          <div class="stop-dot"></div>
          <div class="stop-connector"></div>
        </div>
        <div class="stop-body">
          <p class="stop-time">${stop.time}</p>
          <p class="stop-name">${stop.name}</p>
          <p class="stop-desc">${stop.desc}</p>
          ${stop.route ? `<button class="route-btn" type="button" data-route="${stop.route}">${stop.route === 1 ? '대중교통' : '택시'} 길찾기</button>` : ''}
        </div>
      </div>
    `).join('');
  };

  const setActiveStop = (index) => {
    document.querySelectorAll('.stop').forEach(s => s.classList.remove('active'));
    document.querySelector(`.stop[data-stop="${index}"]`)?.classList.add('active');
  };

  const focusStop = (index) => {
    const stop = stops[index];
    if (!stop) return;
    setActiveStop(index);
    map.panTo(new naver.maps.LatLng(stop.lat, stop.lng));
    map.setZoom(stop.cafe ? 16 : 15, true);
    if (stop.cafe) showCafePanel();
  };

  renderTimeline();

  // 숫자 마커
  stops.forEach((stop, i) => {
    const marker = new naver.maps.Marker({
      position: new naver.maps.LatLng(stop.lat, stop.lng),
      map,
      title: stop.name,
      icon: {
        content: `<div style="
          width:28px;height:28px;
          background:#1a1916;color:#f7f6f4;
          border-radius:50%;
          display:flex;align-items:center;justify-content:center;
          font-family:'DM Mono',monospace;font-size:11px;
          box-shadow:0 2px 8px rgba(0,0,0,0.18);
        " title="${stop.name}">${i + 1}</div>`,
        anchor: new naver.maps.Point(14, 14),
      },
    });
    naver.maps.Event.addListener(marker, 'click', () => focusStop(i));
  });

  // 경로 선
  new naver.maps.Polyline({
    map,
    path: stops.map(s => new naver.maps.LatLng(s.lat, s.lng)),
    strokeColor: '#1a1916',
    strokeWeight: 2,
    strokeOpacity: 0.35,
  });

  let activeInfo = null;
  cafes.forEach(cafe => {
    const marker = new naver.maps.Marker({
      position: new naver.maps.LatLng(cafe.lat, cafe.lng),
      map,
      icon: {
        content: `<div style="
          width: 24px; height: 24px;
          background: #fff;
          border: 2px solid #8a8780;
          border-radius: 50%;
          display: flex; align-items: center; justify-content: center;
          font-size: 11px;
          box-shadow: 0 2px 6px rgba(0,0,0,0.15);
          cursor: pointer;
        ">☕</div>`,
        anchor: new naver.maps.Point(12, 12),
      }
    });

    const infoWindow = new naver.maps.InfoWindow({
      content: `<div style="
        width: 160px; padding: 0; border-radius: 4px; overflow: hidden;
        font-family: 'Noto Sans KR', sans-serif;
        box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      ">
        <img src="${cafe.img}" style="width:100%;height:230px;object-fit:contain;background:#f1f0ed;display:block;">
        <div style="padding:10px 12px;background:#fff;">
          <p style="margin:0;font-size:12px;font-weight:500;color:#1a1916;">${cafe.name}</p>
        </div>
      </div>`,
      borderWidth: 0,
      backgroundColor: 'transparent',
      disableAnchor: true,
    });

    naver.maps.Event.addListener(marker, 'click', () => {
      if (activeInfo) activeInfo.close();
      if (activeInfo === infoWindow) { activeInfo = null; return; }
      infoWindow.open(map, marker);
      activeInfo = infoWindow;
      showCafePanel(cafe.name);
    });
  });

  const mapBounds = new naver.maps.LatLngBounds();
  [...stops, ...cafes].forEach(item => {
    mapBounds.extend(new naver.maps.LatLng(item.lat, item.lng));
  });
  map.fitBounds(mapBounds, { top: 70, right: 70, bottom: 70, left: 70 });

  // 사이드바 클릭 → 지도 이동
  document.querySelectorAll('.stop').forEach((el) => {
    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('route-btn')) {
        showRoutePanel(Number(e.target.dataset.route));
        return;
      }
      focusStop(Number(el.dataset.stop));
    });
  });
</script>
</body>
</html>
