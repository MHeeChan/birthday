<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>06.20 — 김혜원</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&family=DM+Mono:ital@0;1&display=swap" rel="stylesheet">
  <script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=43cf34s2e6"></script>
  <script>
    window.navermap_authFailure = function () {
      document.getElementById('map').innerHTML =
        '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#8a8780;font-family:sans-serif;font-size:14px;text-align:center;padding:20px;">' +
        '지도 인증 실패<br><span style="font-size:12px;">NCP 콘솔에 이 사이트 주소를 등록해야 떠요</span></div>';
    };
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f4;
      --surface: #ffffff;
      --border: #e2e0db;
      --text: #1a1916;
      --muted: #8a8780;
      --accent: #1a1916;
      --tag-bg: #edece9;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    /* 레이아웃 */
    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      min-height: 100vh;
    }

    /* 사이드바 */
    .sidebar {
      border-right: 1px solid var(--border);
      padding: 48px 32px;
      display: flex;
      flex-direction: column;
      gap: 48px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-header {}

    .date-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .name {
      font-size: 2rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    .name-sub {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 6px;
    }

    /* 타임라인 */
    .timeline {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .stop {
      display: grid;
      grid-template-columns: 48px 1fr;
      gap: 0 12px;
      cursor: pointer;
    }

    .stop-line {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .stop-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      border: 2px solid var(--border);
      flex-shrink: 0;
      margin-top: 18px;
      transition: background 0.2s, border-color 0.2s;
    }

    .stop.active .stop-dot,
    .stop:hover .stop-dot {
      background: var(--accent);
      border-color: var(--accent);
    }

    .stop-connector {
      width: 1px;
      flex: 1;
      background: var(--border);
      margin: 4px 0;
    }

    .stop:last-child .stop-connector {
      display: none;
    }

    .stop-body {
      padding: 12px 0 20px;
    }

    .stop-time {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      margin-bottom: 3px;
    }

    .stop-name {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.3;
    }

    .stop-desc {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2px;
      line-height: 1.5;
    }

    .stop.active .stop-name {
      color: var(--accent);
    }

    .route-btn {
      display: inline-block;
      margin-top: 7px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      transition: color 0.2s, border-color 0.2s;
    }
    .route-btn:hover {
      color: var(--text);
      border-color: var(--text);
    }

    /* 메인 — 지도 */
    .main {
      display: flex;
      flex-direction: column;
    }

    .map-header {
      padding: 20px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .map-title {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .stop-count {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    #map {
      flex: 1;
      width: 100%;
      min-height: calc(100vh - 60px);
    }

    /* 모바일 */
    @media (max-width: 700px) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }

      .sidebar {
        position: static;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 32px 20px;
        gap: 32px;
      }

      #map {
        min-height: 60vh;
      }
    }
  </style>
</head>
<body>

<div class="layout">

  <!-- 사이드바 -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <p class="date-label">2026 · 06 · 20</p>
      <h1 class="name">김혜원</h1>
      <p class="name-sub">생일 동선</p>
    </div>

    <div class="timeline">

      <div class="stop" data-lat="37.3219" data-lng="127.1086">
        <div class="stop-line">
          <div class="stop-dot"></div>
          <div class="stop-connector"></div>
        </div>
        <div class="stop-body">
          <p class="stop-time">START</p>
          <p class="stop-name">풍덕천동 71-170</p>
          <p class="stop-desc">출발</p>
        </div>
      </div>

      <div class="stop" data-lat="37.5443" data-lng="127.0557">
        <div class="stop-line">
          <div class="stop-dot"></div>
          <div class="stop-connector"></div>
        </div>
        <div class="stop-body">
          <p class="stop-time">12:00</p>
          <p class="stop-name">강별 성수</p>
          <p class="stop-desc">점심 코스</p>
          <a class="route-btn" href="https://map.naver.com/index.nhn?slng=127.1086&slat=37.3219&stext=풍덕천동&elng=127.0557&elat=37.5443&etext=강별성수&menu=route&pathType=2" target="_blank">🚇 대중교통 길찾기</a>
        </div>
      </div>

      <div class="stop" data-lat="37.5350" data-lng="127.0020">
        <div class="stop-line">
          <div class="stop-dot"></div>
          <div class="stop-connector"></div>
        </div>
        <div class="stop-body">
          <p class="stop-time">이동</p>
          <p class="stop-name">미닛뮤트 플래그십스토어</p>
          <p class="stop-desc">택시 이동</p>
          <a class="route-btn" href="https://map.naver.com/index.nhn?slng=127.0557&slat=37.5443&stext=강별성수&elng=127.0020&elat=37.5350&etext=미닛뮤트&menu=route&pathType=0" target="_blank">🚕 택시 길찾기</a>
        </div>
      </div>

      <div class="stop" data-lat="37.5350" data-lng="127.0025">
        <div class="stop-line">
          <div class="stop-dot"></div>
          <div class="stop-connector"></div>
        </div>
        <div class="stop-body">
          <p class="stop-time">오후</p>
          <p class="stop-name">근처 카페</p>
          <p class="stop-desc">한남동 일대 — 지도에서 선택</p>
        </div>
      </div>

      <div class="stop" data-lat="37.5467" data-lng="126.9878">
        <div class="stop-line">
          <div class="stop-dot"></div>
          <div class="stop-connector"></div>
        </div>
        <div class="stop-body">
          <p class="stop-time">저녁</p>
          <p class="stop-name">해방촌</p>
          <p class="stop-desc">간맥 후 귀가</p>
        </div>
      </div>

    </div>
  </aside>

  <!-- 지도 -->
  <main class="main">
    <div class="map-header">
      <span class="map-title">Route Map</span>
      <span class="stop-count">5 stops</span>
    </div>
    <div id="map"></div>
  </main>

</div>

<script>
  const stops = [
    { name: '풍덕천동 71-170', lat: 37.3219, lng: 127.1086, time: 'START' },
    { name: '강별 성수',       lat: 37.5443, lng: 127.0557, time: '12:00' },
    { name: '미닛뮤트',        lat: 37.5447, lng: 127.0444, time: '이동'  },
    { name: '근처 카페',       lat: 37.5460, lng: 127.0430, time: '오후'  },
    { name: '해방촌',          lat: 37.5467, lng: 126.9878, time: '저녁'  },
  ];

  const map = new naver.maps.Map('map', {
    center: new naver.maps.LatLng(37.48, 127.04),
    zoom: 11,
    mapTypeControl: false,
    scaleControl: false,
    logoControl: true,
    zoomControl: true,
    zoomControlOptions: { position: naver.maps.Position.TOP_RIGHT },
  });

  // 숫자 마커
  stops.forEach((stop, i) => {
    new naver.maps.Marker({
      position: new naver.maps.LatLng(stop.lat, stop.lng),
      map,
      title: stop.name,
      icon: {
        content: `<div style="
          width:28px;height:28px;
          background:#1a1916;color:#f7f6f4;
          border-radius:50%;
          display:flex;align-items:center;justify-content:center;
          font-family:'DM Mono',monospace;font-size:11px;
          box-shadow:0 2px 8px rgba(0,0,0,0.18);
        " title="${stop.name}">${i + 1}</div>`,
        anchor: new naver.maps.Point(14, 14),
      },
    });
  });

  // 경로 선
  new naver.maps.Polyline({
    map,
    path: stops.map(s => new naver.maps.LatLng(s.lat, s.lng)),
    strokeColor: '#1a1916',
    strokeWeight: 2,
    strokeOpacity: 0.35,
  });

  // 카페 마커
  const cafes = [
    { name: '낫배드커피',       lat: 37.5343, lng: 127.0025, img: './cafe/낫배드커피.jpg' },
    { name: '네로우패스',       lat: 37.5355, lng: 127.0012, img: './cafe/네로우패스.jpg' },
    { name: '브리즈서울',       lat: 37.5345, lng: 127.0038, img: './cafe/브리즈서울.jpg' },
    { name: '아벡쉐리',         lat: 37.5338, lng: 126.9997, img: './cafe/아벡쉐리.jpg' },
    { name: '아스티에드빌라트', lat: 37.5350, lng: 127.0018, img: './cafe/아스티에드빌라트카페.jpg' },
    { name: '코제트 한남',      lat: 37.5348, lng: 127.0032, img: './cafe/코제트한남.jpg' },
    { name: '한남작업실',       lat: 37.5343, lng: 127.0042, img: './cafe/한남작업실.jpg' },
  ];

  let activeInfo = null;
  cafes.forEach(cafe => {
    const marker = new naver.maps.Marker({
      position: new naver.maps.LatLng(cafe.lat, cafe.lng),
      map,
      icon: {
        content: `<div style="
          width: 24px; height: 24px;
          background: #fff;
          border: 2px solid #8a8780;
          border-radius: 50%;
          display: flex; align-items: center; justify-content: center;
          font-size: 11px;
          box-shadow: 0 2px 6px rgba(0,0,0,0.15);
          cursor: pointer;
        ">☕</div>`,
        anchor: new naver.maps.Point(12, 12),
      }
    });

    const infoWindow = new naver.maps.InfoWindow({
      content: `<div style="
        width: 180px; padding: 0; border-radius: 4px; overflow: hidden;
        font-family: 'Noto Sans KR', sans-serif;
        box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      ">
        <img src="${cafe.img}" style="width:100%;height:110px;object-fit:cover;display:block;">
        <div style="padding:10px 12px;background:#fff;">
          <p style="margin:0;font-size:12px;font-weight:500;color:#1a1916;">${cafe.name}</p>
        </div>
      </div>`,
      borderWidth: 0,
      backgroundColor: 'transparent',
      disableAnchor: true,
    });

    naver.maps.Event.addListener(marker, 'click', () => {
      if (activeInfo) activeInfo.close();
      if (activeInfo === infoWindow) { activeInfo = null; return; }
      infoWindow.open(map, marker);
      activeInfo = infoWindow;
    });
  });

  // 사이드바 클릭 → 지도 이동
  document.querySelectorAll('.stop').forEach((el, i) => {
    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('route-btn')) return;
      document.querySelectorAll('.stop').forEach(s => s.classList.remove('active'));
      el.classList.add('active');
      map.panTo(new naver.maps.LatLng(stops[i].lat, stops[i].lng));
      map.setZoom(15, true);
    });
  });
</script>
</body>
</html>
